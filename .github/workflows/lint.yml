name: Lint
on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Extract and shellcheck bash blocks
        run: |
          fail=0
          for md in *.md; do
            awk '/^```bash$/,/^```$/' "$md" | grep -v '^```' > /tmp/block.sh || true
            if [ -s /tmp/block.sh ]; then
              shellcheck --shell=bash --severity=warning /tmp/block.sh || fail=1
            fi
          done
          exit $fail

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "*.md"
