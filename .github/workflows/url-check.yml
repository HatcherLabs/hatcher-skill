name: URL Check
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  head-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Extract URLs and HEAD-check
        run: |
          grep -oEh 'https://[a-zA-Z0-9./_-]+' *.md | sort -u > /tmp/urls.txt
          fail=0
          while read -r url; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 -I "$url" || echo "000")
            echo "$code $url"
            [[ "$code" =~ ^(2|3) ]] || fail=1
          done < /tmp/urls.txt
          exit $fail
