name: URL Check
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  head-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Extract URLs and probe
        # Only reads checked-out *.md files; no untrusted inputs — safe from
        # workflow-injection patterns.
        run: |
          # Extract unique https URLs from all markdown files.
          # Strip trailing punctuation that isn't a valid URL char.
          grep -oEh 'https://[a-zA-Z0-9./_-]+' *.md | sed 's/[.]*$//' | sort -u > /tmp/urls.txt

          fail=0
          while read -r url; do
            # Try HEAD first; if server returns HEAD-not-supported (404/405)
            # or the connection plain fails (000), retry with a redirect-
            # following GET. Fastify and many APIs only register POST/GET
            # on specific paths — a HEAD 404 means "method not handled",
            # not "URL broken".
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 -I "$url" || echo "000")
            if [[ "$code" == "404" || "$code" == "405" || "$code" == "000" ]]; then
              code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 -L "$url" || echo "000")
            fi
            echo "$code $url"

            # Any HTTP response from the server proves the host is reachable
            # and the path is handled (even 401/403/400/404 on GET for
            # auth-gated or POST-only endpoints — the server chose to return
            # that, which means the endpoint is real). Only treat 5xx and
            # total connection failure (000) as a genuine breakage.
            case "$code" in
              2*|3*|4*) : ;;  # OK
              5*|000) fail=1 ;;
              *) fail=1 ;;
            esac
          done < /tmp/urls.txt
          exit $fail
